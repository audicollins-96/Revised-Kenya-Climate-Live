name: Hourly Logger

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install Packages
        run: Rscript -e 'install.packages(c("jsonlite", "dplyr", "readr"))'

      - name: Run Script
        run: Rscript collector.R

      - name: Commit and Push Data
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add weather_history.csv
          git commit -m "Update hourly weather [skip ci]" || echo "No changes to commit"
          git push